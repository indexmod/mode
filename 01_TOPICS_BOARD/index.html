<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Indexmod Fashion & Art 2026</title>

  <link rel="icon" type="image/png" href="logo.png">

  <style>
    @import url('https://fonts.googleapis.com/css?family=Old+Standard+TT');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Old Standard TT', serif;
      background: #fff;
      color: #111;
      margin: 40px;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
    }

    /* HEADER (как в indexmod 3.0) */
    .header {
      margin-bottom: 50px;
    }

    .logo {
      height: 60px;
      margin-bottom: 10px;
    }

    h1 {
      font-size: 3rem;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    /* 3 КОЛОНКИ */
    .topics {
      display: flex;
      justify-content: space-between;
      gap: 40px;
    }

    .column {
      width: 32%;
    }

    /* ГРУППА БУКВЫ */
    .topic-group {
      margin-bottom: 40px;
    }

    h2 {
      font-size: 1.2rem;
      font-weight: 600;
      margin-bottom: 10px;
      color: #000;
    }

    /* ТОПИКИ */
    .topic {
      display: block;
      font-size: 1rem;
      line-height: 1.5;
      text-decoration: none;
      color: #111;
      transition: color 0.2s;
      cursor: pointer;
    }

    .topic:hover {
      color: #777;
    }

    /* БУКВИЦА (ОДНА НА ГРУППУ) */
    .topic-group:first-letter {
      font-size: 3.5rem;
      float: left;
      line-height: 1;
      padding-right: 10px;
      font-weight: 700;
    }

    /* OUTPUT (минимальный, не как блок) */
    #output {
      margin-top: 60px;
      font-size: 0.9rem;
      opacity: 0.6;
    }

    /* RESPONSIVE */
    @media (max-width: 1024px) {
      .topics {
        flex-wrap: wrap;
      }
      .column {
        width: 48%;
      }
    }

    @media (max-width: 768px) {
      .column {
        width: 100%;
      }
    }
  </style>
</head>

<body>

  <div class="container">

    <header class="header">
      <img src="logo.png" class="logo">
      <h1>Indexmod Fashion & Art 2026</h1>
    </header>

    <div class="topics" id="list"></div>

    <div id="output">Click a topic</div>

  </div>

  <script type="module">
    import { loadTopics } from './topics.js';

    const list = document.getElementById('list');
    const output = document.getElementById('output');

    const topics = await loadTopics();

    function slugify(text) {
      return text
        .toLowerCase()
        .replace(/[^a-z0-9]+/g, "-")
        .replace(/(^-|-$)+/g, "");
    }

    // группировка
    const groups = {};

    topics.forEach(t => {
      const letter = t[0].toUpperCase();
      if (!groups[letter]) groups[letter] = [];
      groups[letter].push(t);
    });

    const sortedLetters = Object.keys(groups).sort();

    // создаём 3 колонки
    const cols = [document.createElement('div'),
                 document.createElement('div'),
                 document.createElement('div')];

    cols.forEach(c => c.className = 'column');

    sortedLetters.forEach((letter, i) => {
      const group = document.createElement('div');
      group.className = 'topic-group';

      const title = document.createElement('h2');
      title.textContent = letter;

      group.appendChild(title);

      groups[letter]
        .sort()
        .forEach(topic => {
          const a = document.createElement('a');
          a.className = 'topic';
          a.textContent = topic;

          const slug = slugify(topic);
          a.href = `../dist/${slug}.html`;
          a.target = "_blank";

          a.onclick = () => {
            output.textContent = topic;
          };

          group.appendChild(a);
        });

      cols[i % 3].appendChild(group);
    });

    cols.forEach(c => list.appendChild(c));
  </script>

</body>
</html>
