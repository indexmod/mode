<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Topics Board</title>

  <style>
    /* ------------------------------ */
    /* Подключение шрифта */
    /* ------------------------------ */
    @import url('https://fonts.googleapis.com/css?family=Old+Standard+TT');

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      font-size: 16px;
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Old Standard TT', serif;
      line-height: 1.6;
      color: #333;
      background-color: #fff;
      margin: 40px;
    }

    h1 {
      font-size: 3rem;
      font-weight: bold;
      margin-bottom: 1.5rem;
    }

    h2 {
      font-size: 1.6rem;
      font-weight: 700;
      margin: 0 0 0.5rem;
      border-bottom: 1px solid #eee;
      padding-bottom: 0.2rem;
    }

    /* ------------------------------ */
    /* Layout */
    /* ------------------------------ */
    #list {
      max-width: 1200px;
    }

    .topic-group {
      margin-bottom: 1.5rem;
    }

    .topic {
      display: block;
      cursor: pointer;
      padding: 5px 0;
      text-decoration: none;
      color: inherit;
      transition: color 0.2s;
    }

    .topic:hover {
      color: #0077ff;
    }

    /* Буквица */
    .topic-group .topic:first-of-type::first-letter {
      font-size: 2.4rem;
      font-weight: bold;
      float: left;
      line-height: 1;
      padding-right: 6px;
      padding-top: 2px;
    }

    #output {
      margin-top: 30px;
      padding: 20px;
      background: #f5f5f5;
      border-radius: 10px;
      min-height: 100px;
      font-size: 14px;
    }
  </style>
</head>

<body>

  <h1>📚 Topics Board</h1>

  <div id="list"></div>

  <div id="output">
    Click a topic to open generated article
  </div>

  <script type="module">
    import { loadTopics } from './topics.js';

    const list = document.getElementById('list');
    const output = document.getElementById('output');

    function slugify(text) {
      return text
        .toLowerCase()
        .replace(/[^a-z0-9]+/g, "-")
        .replace(/(^-|-$)+/g, "");
    }

    const topics = await loadTopics();

    // 🔥 ГРУППИРОВКА
    const groups = {};

    topics.forEach(topic => {
      const letter = topic[0].toUpperCase();

      if (!groups[letter]) {
        groups[letter] = [];
      }

      groups[letter].push(topic);
    });

    const sortedLetters = Object.keys(groups).sort();

    // 🔥 РЕНДЕР
    sortedLetters.forEach(letter => {
      const groupDiv = document.createElement('div');
      groupDiv.className = 'topic-group';

      const title = document.createElement('h2');
      title.textContent = letter;

      groupDiv.appendChild(title);

      groups[letter]
        .sort()
        .forEach(topic => {
          const slug = slugify(topic);

          const link = document.createElement('a');
          link.className = 'topic';
          link.textContent = topic;

          link.href = `../dist/${slug}.html`;
          link.target = "_blank";

          link.onclick = () => {
            output.innerHTML = `
              <h3>Opening article:</h3>
              <p>${topic}</p>
            `;
          };

          groupDiv.appendChild(link);
        });

      list.appendChild(groupDiv);
    });
  </script>

</body>
</html>
