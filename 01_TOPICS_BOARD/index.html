<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Topics Board</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 40px;
      background: #0f0f0f;
      color: #ffffff;
    }

    h1 {
      font-size: 22px;
      margin-bottom: 20px;
    }

    .topic {
      display: block;
      padding: 10px 14px;
      margin: 6px 0;
      background: #1e1e1e;
      border-radius: 8px;
      text-decoration: none;
      color: white;
      transition: 0.2s;
    }

    .topic:hover {
      background: #2a2a2a;
    }

    #output {
      margin-top: 30px;
      padding: 20px;
      background: #111;
      border-radius: 10px;
      min-height: 100px;
      font-size: 14px;
      opacity: 0.8;
    }
  </style>
</head>

<body>

  <h1>📚 Topics Board</h1>

  <div id="list"></div>

  <div id="output">
    Click a topic to open generated article
  </div>

  <script type="module">
    import { loadTopics } from './topics.js';

    const list = document.getElementById('list');
    const output = document.getElementById('output');

    function slugify(text) {
      return text
        .toLowerCase()
        .replace(/[^a-z0-9]+/g, "-")
        .replace(/(^-|-$)+/g, "");
    }

    const topics = await loadTopics();

    topics.forEach(topic => {
      const slug = slugify(topic);

      const link = document.createElement('a');
      link.className = 'topic';
      link.textContent = topic;

      // 👉 ссылка на сгенерированную страницу
      link.href = `../dist/${slug}.html`;
      link.target = "_blank";

      link.onclick = () => {
        output.innerHTML = `
          <h3>Opening article:</h3>
          <p>${topic}</p>
        `;
      };

      list.appendChild(link);
    });
  </script>

</body>
</html>
