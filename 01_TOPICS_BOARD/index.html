<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Indexmod Fashion & Art 2026</title>

  <link rel="icon" type="image/png" href="logo.png">

  <style>
    @import url('https://fonts.googleapis.com/css?family=Old+Standard+TT');

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Old Standard TT', serif;
      background: #fff;
      color: #111;
      margin: 40px;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
    }

    /* HEADER */
    .header {
      margin-bottom: 40px;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
    }

    .logo {
      height: 60px;
      width: auto;
      margin-bottom: 10px;
    }

    h1 {
      font-size: 3rem;
      font-weight: 700;
    }

    h2 {
      font-size: 1.4rem;
      margin: 25px 0 10px;
      border-bottom: 1px solid #eee;
      padding-bottom: 5px;
    }

    /* TOPICS LAYOUT */
    .topics {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .topic-group {
      margin-bottom: 20px;
    }

    .topic {
      display: block;
      padding: 4px 0;
      text-decoration: none;
      color: inherit;
      cursor: pointer;
      transition: color 0.2s;
    }

    .topic:hover {
      color: #0077ff;
    }

    /* буквица */
    .topic-group .topic:first-of-type::first-letter {
      font-size: 2.2rem;
      font-weight: bold;
      float: left;
      line-height: 1;
      padding-right: 6px;
      padding-top: 2px;
    }

    /* OUTPUT */
    #output {
      margin-top: 40px;
      padding: 20px;
      border: 1px solid #eee;
      min-height: 80px;
    }
  </style>
</head>

<body>

  <div class="container">

    <header class="header">
      <img src="logo.png" alt="Logo" class="logo">
      <h1>Indexmod Fashion & Art 2026</h1>
    </header>

    <!-- TOPICS -->
    <div class="topics" id="list"></div>

    <!-- OUTPUT -->
    <div id="output">
      Click a topic to open generated article
    </div>

  </div>

  <script type="module">
    import { loadTopics } from './topics.js';

    const list = document.getElementById('list');
    const output = document.getElementById('output');

    function slugify(text) {
      return text
        .toLowerCase()
        .replace(/[^a-z0-9]+/g, "-")
        .replace(/(^-|-$)+/g, "");
    }

    const topics = await loadTopics();

    // группировка
    const groups = {};

    topics.forEach(topic => {
      const letter = topic[0].toUpperCase();

      if (!groups[letter]) groups[letter] = [];
      groups[letter].push(topic);
    });

    Object.keys(groups).sort().forEach(letter => {
      const group = document.createElement('div');
      group.className = 'topic-group';

      const title = document.createElement('h2');
      title.textContent = letter;

      group.appendChild(title);

      groups[letter].sort().forEach(topic => {
        const link = document.createElement('a');
        link.className = 'topic';
        link.textContent = topic;

        const slug = slugify(topic);
        link.href = `../dist/${slug}.html`;
        link.target = "_blank";

        link.onclick = () => {
          output.innerHTML = `
            <h3>Opening article:</h3>
            <p>${topic}</p>
          `;
        };

        group.appendChild(link);
      });

      list.appendChild(group);
    });
  </script>

</body>
</html>
