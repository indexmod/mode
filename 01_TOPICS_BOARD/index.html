<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Indexmod Fashion & Art 2026</title>

  <link rel="icon" type="image/png" href="./logo.png">

  <style>
    @import url('https://fonts.googleapis.com/css?family=Old+Standard+TT');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Old Standard TT', serif;
      background: #fff;
      color: #111;
      margin: 40px;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
    }

    /* HEADER — максимально близко к indexmod */
    .header {
      margin-bottom: 60px;
    }

    .logo {
      height: 58px;
      display: block;
      margin-bottom: 10px;
    }

    h1 {
      font-size: 3rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      line-height: 1.05;
    }

    /* 3 КОЛОНКИ (как editorial grid) */
    .topics {
      display: flex;
      gap: 60px;
      align-items: flex-start;
    }

    .column {
      flex: 1;
    }

    /* ГРУППА */
    .topic-group {
      margin-bottom: 40px;
      position: relative;
    }

    /* буква как indexmod (одна на группу) */
    .topic-group h2 {
      font-size: 1.1rem;
      font-weight: 600;
      margin-bottom: 10px;
      letter-spacing: 0.02em;
    }

    /* топики */
    .topic {
      display: block;
      font-size: 1rem;
      line-height: 1.55;
      text-decoration: none;
      color: #111;
      transition: color 0.25s ease;
    }

    .topic:hover {
      color: #888;
    }

    /* БУКВИЦА — строгая editorial версия */
    .topic-group h2::first-letter {
      font-size: 3.6rem;
      float: left;
      line-height: 0.9;
      padding-right: 10px;
      font-weight: 700;
    }

    /* OUTPUT минимальный (как в indexmod — почти служебный слой) */
    #output {
      margin-top: 80px;
      font-size: 0.85rem;
      color: #999;
      letter-spacing: 0.02em;
    }

    /* RESPONSIVE */
    @media (max-width: 1100px) {
      .topics {
        gap: 40px;
      }
    }

    @media (max-width: 900px) {
      .topics {
        flex-direction: column;
      }

      .column {
        width: 100%;
      }
    }
  </style>
</head>

<body>

  <div class="container">

    <header class="header">
      <img src="./logo.png" class="logo" alt="logo">
      <h1>Indexmod Fashion & Art 2026</h1>
    </header>

    <div class="topics" id="list"></div>

    <div id="output">Click a topic</div>

  </div>

  <script type="module">
    import { loadTopics } from './topics.js';

    const list = document.getElementById('list');
    const output = document.getElementById('output');

    const topics = await loadTopics();

    function slugify(text) {
      return text
        .toLowerCase()
        .replace(/[^a-z0-9]+/g, "-")
        .replace(/(^-|-$)+/g, "");
    }

    // группировка
    const groups = {};

    topics.forEach(t => {
      const letter = t[0].toUpperCase();
      if (!groups[letter]) groups[letter] = [];
      groups[letter].push(t);
    });

    const sortedLetters = Object.keys(groups).sort();

    // 3 колонки
    const cols = Array.from({ length: 3 }, () => {
      const c = document.createElement('div');
      c.className = 'column';
      return c;
    });

    sortedLetters.forEach((letter, i) => {
      const group = document.createElement('div');
      group.className = 'topic-group';

      const title = document.createElement('h2');
      title.textContent = letter;

      group.appendChild(title);

      groups[letter]
        .sort()
        .forEach(topic => {
          const a = document.createElement('a');
          a.className = 'topic';
          a.textContent = topic;

          const slug = slugify(topic);
          a.href = `./dist/${slug}.html`;
          a.target = "_blank";

          a.onclick = () => {
            output.textContent = topic;
          };

          group.appendChild(a);
        });

      cols[i % 3].appendChild(group);
    });

    cols.forEach(c => list.appendChild(c));
  </script>

</body>
</html>
