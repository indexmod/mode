<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Indexmod Fashion & Art 2026</title>

  <!-- подключаем внешний стиль -->
  <link rel="stylesheet" href="./styles.css">
</head>

<body>

  <div class="container">

    <!-- LOGO -->
    <img src="./logo.png" class="logo" alt="logo">

    <div class="topics" id="list"></div>

    <div id="output">Click a topic</div>

  </div>

  <script type="module">
    import { loadTopics } from './topics.js';

    const list = document.getElementById('list');
    const output = document.getElementById('output');

    const topics = await loadTopics();

    function slugify(text) {
      return text
        .toLowerCase()
        .replace(/[^a-z0-9]+/g, "-")
        .replace(/(^-|-$)+/g, "");
    }

    const groups = {};

    topics.forEach(t => {
      const letter = t[0].toUpperCase();
      if (!groups[letter]) groups[letter] = [];
      groups[letter].push(t);
    });

    const cols = Array.from({ length: 3 }, () => {
      const c = document.createElement('div');
      c.className = 'column';
      return c;
    });

    Object.keys(groups).sort().forEach((letter, i) => {
      const group = document.createElement('div');
      group.className = 'topic-group';

      const title = document.createElement('h2');
      title.innerHTML = `<span class="letter">${letter}</span>`;
      group.appendChild(title);

      groups[letter].sort().forEach(topic => {
        const a = document.createElement('a');
        a.className = 'topic';
        a.textContent = topic;

        const slug = slugify(topic);
        a.href = `./dist/${slug}.html`;
        a.target = "_blank";

        a.onclick = () => {
          output.textContent = topic;
        };

        group.appendChild(a);
      });

      cols[i % 3].appendChild(group);
    });

    cols.forEach(c => list.appendChild(c));
  </script>

</body>
</html>
