<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Indexmod Fashion & Art 2026</title>

  <!-- FAVICON + META -->
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml;charset=UTF-8,
<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'>
  <defs>
    <radialGradient id='g' cx='35%' cy='30%' r='60%'>
      <stop offset='0%' stop-color='white'/>
      <stop offset='40%' stop-color='#e6e6e6'/>
      <stop offset='100%' stop-color='#9a9a9a'/>
    </radialGradient>

    <radialGradient id='highlight' cx='30%' cy='25%' r='40%'>
      <stop offset='0%' stop-color='rgba(255,255,255,0.9)'/>
      <stop offset='100%' stop-color='rgba(255,255,255,0)'/>
    </radialGradient>
  </defs>

  <circle cx='50' cy='50' r='48' fill='url(#g)'/>
  <ellipse cx='38' cy='32' rx='18' ry='12' fill='url(#highlight)'/>
</svg>">

<meta name="theme-color" content="#d9d9d9">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="./styles.css">
</head>

<body>

  <div class="container">

    <img src="./logo.png" class="logo" alt="logo">

    <div class="columns-container" id="list"></div>

  </div>

  <script type="module">
    import { loadTopics } from './topics.js';

    const list = document.getElementById('list');
    const topics = await loadTopics();

    const groups = {};

    function slugify(text) {
      return text
        .toLowerCase()
        .replace(/[^a-z0-9]+/g, "-")
        .replace(/(^-|-$)+/g, "");
    }

    // группировка
    topics.forEach(t => {
      const letter = t[0].toUpperCase();
      if (!groups[letter]) groups[letter] = [];
      groups[letter].push(t);
    });

    // 3 колонки
    const cols = Array.from({ length: 3 }, () => {
      const c = document.createElement('div');
      c.className = 'column';
      list.appendChild(c);
      return c;
    });

    // рендер
    Object.keys(groups).sort().forEach((letter, i) => {

      const group = document.createElement('div');
      group.className = 'topic-group';

      const title = document.createElement('h2');
      title.innerHTML = `<span class="letter">${letter}</span>`;
      group.appendChild(title);

      groups[letter].sort().forEach(topic => {

        const item = document.createElement('div');
        item.className = 'topic-item';

        const a = document.createElement('a');
        a.className = 'topic';
        a.textContent = topic;

        const slug = slugify(topic);

        // 🔥 главное изменение
        a.href = `./article.html?slug=${slug}`;
        a.target = "_blank";
        a.rel = "noopener noreferrer";

        item.appendChild(a);
        group.appendChild(item);
      });

      cols[i % 3].appendChild(group);
    });
  </script>

</body>
</html>
