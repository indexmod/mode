<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Indexmod Fashion & Art 2026</title>

  <link rel="stylesheet" href="./styles.css">
</head>

<body>

  <div class="container">

    <img src="./logo.png" class="logo" alt="logo">

    <div class="columns-container" id="list"></div>

    <div id="output">Click a topic</div>

  </div>

  <script type="module">
    import { loadTopics } from './topics.js';

    const list = document.getElementById('list');
    const output = document.getElementById('output');

    const topics = await loadTopics();

    const groups = {};

    // группировка по первой букве
    topics.forEach(t => {
      const letter = t[0].toUpperCase();
      if (!groups[letter]) groups[letter] = [];
      groups[letter].push(t);
    });

    // создаём 3 колонки
    const cols = Array.from({ length: 3 }, () => {
      const c = document.createElement('div');
      c.className = 'column';
      list.appendChild(c);
      return c;
    });

    // slugify для URL
    function slugify(text) {
      return text
        .toLowerCase()
        .replace(/[^a-z0-9]+/g, "-")
        .replace(/(^-|-$)+/g, "");
    }

    // рендер групп
    Object.keys(groups).sort().forEach((letter, i) => {

      const group = document.createElement('div');
      group.className = 'topic-group';

      const title = document.createElement('h2');
      title.innerHTML = `<span class="letter">${letter}</span>`;
      group.appendChild(title);

      // рендер тем внутри группы
      groups[letter].sort().forEach(topic => {

        const item = document.createElement('div');
        item.className = 'topic-item';

        const a = document.createElement('a');
        a.className = 'topic';
        a.textContent = topic;

        const slug = slugify(topic);

        a.href = `https://indexmod-ai.chorus-live.workers.dev/article/${slug}`;
        a.target = "_blank";
        a.rel = "noopener noreferrer";

        item.appendChild(a);
        group.appendChild(item);
      });

      cols[i % 3].appendChild(group);
    });
  </script>

</body>
</html>
