<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Loading...</title>

  <link rel="stylesheet" href="./styles.css">

  <!-- Markdown parser -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>

<body>

<div class="content-container">
  <div id="article">Generating article...</div>
</div>

<script>
const params = new URLSearchParams(window.location.search);
const slug = params.get("slug");

const container = document.getElementById("article");

if (!slug) {
  container.innerHTML = "<p>No article</p>";
} else {

  const workerURL = `https://indexmod-ai.chorus-live.workers.dev/article/${slug}`;

  async function loadArticle() {
    try {
      const res = await fetch(workerURL);
      const md = await res.text();

      // Markdown → HTML
      const html = marked.parse(md);

      container.innerHTML = html;

      // заголовок страницы
      const firstLine = md.split("\n")[0];
      if (firstLine.startsWith("# ")) {
        document.title = firstLine.replace("# ", "");
      }

    } catch (err) {
      container.innerHTML = "<p>Error loading article</p>";
      console.error(err);
    }
  }

  loadArticle();
}
</script>

</body>
</html>
