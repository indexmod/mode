<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>{{TITLE}}</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #0f0f0f;
      color: #fff;
    }

    .wrapper {
      max-width: 900px;
      margin: 40px auto;
      padding: 20px;
      background: #1a1a1a;
      border-radius: 12px;
    }

    h1, h2, h3 {
      color: #ffffff;
    }

    code {
      background: #333;
      padding: 2px 6px;
      border-radius: 4px;
    }

    .meta {
      opacity: 0.6;
      font-size: 12px;
      margin-bottom: 20px;
    }
  </style>
</head>

<body>
  <div class="wrapper">
    <div class="meta">{{META}}</div>
    <div class="content">
      {{CONTENT}}
    </div>
  </div>
</body>
</html>
