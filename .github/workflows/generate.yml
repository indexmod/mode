name: Generate Content

on:
  workflow_dispatch:
  push:
    paths:
      - '01_TOPICS_BOARD/topics.txt'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout repo
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 📦 Install deps
        run: npm install

      - name: 🔐 Inject env
        run: echo "GROQ_API_KEY=${{ secrets.GROQ_API_KEY }}" >> .env

      - name: 🧠 Generate all articles
        run: |
          node -e "
          const fs = require('fs');
          const { deploy } = require('./06_DEPLOY_PIPE/deploy');

          const topics = fs.readFileSync('./01_TOPICS_BOARD/topics.txt','utf-8')
            .split('\n')
            .map(t => t.trim())
            .filter(Boolean);

          (async () => {
            for (const topic of topics) {
              console.log('---', topic);
              await deploy(topic);
            }
          })();
          "

      - name: 🚀 Commit & push changes
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add .
          git commit -m "🤖 auto-generate content" || echo "No changes"
          git push
