<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>{{title}}</title>

  <!-- ARTICLE STYLES -->
  <link rel="stylesheet" href="/article.css">
</head>

<body>

<article class="article">

  <h1>{{title}}</h1>

  <div class="meta">
    {{date}} · {{author}}
  </div>

  <div class="content">
    {{content}}
  </div>

  <div class="sources">
    <h3>Sources</h3>
    {{sources}}
  </div>

</article>

</body>
</html>
