<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Worker Lab v2</title>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<style>
body {
  margin:0;
  font-family: system-ui;
  background:#0b0b0b;
  color:#eaeaea;
  display:flex;
  height:100vh;
}

/* LEFT PANEL */
.panel {
  width:360px;
  background:#111;
  border-right:1px solid #222;
  padding:12px;
  overflow:auto;
}

input, button {
  width:100%;
  padding:10px;
  margin:6px 0;
  background:#1a1a1a;
  border:1px solid #333;
  color:#fff;
  border-radius:6px;
  cursor:pointer;
}

button:hover {
  background:#222;
}

/* MAIN */
.main {
  flex:1;
  padding:20px;
  overflow:auto;
}

/* TABS */
.tabs {
  display:flex;
  gap:6px;
  margin-top:10px;
}

.tab {
  flex:1;
  padding:6px;
  text-align:center;
  cursor:pointer;
  background:#1a1a1a;
  border-radius:6px;
}

.tab.active {
  background:#333;
}

/* PRETTY OUTPUT */
pre {
  background:#0f0f0f;
  padding:10px;
  border-radius:6px;
  overflow:auto;
  font-size:12px;
}

.card {
  background:#121212;
  padding:10px;
  margin:6px 0;
  border:1px solid #222;
  border-radius:8px;
}

.small {
  font-size:12px;
  opacity:0.8;
}

.badge {
  display:inline-block;
  padding:2px 6px;
  background:#2a2a2a;
  border-radius:4px;
  margin-right:4px;
}
</style>
</head>

<body>

<div class="panel">

<h3>🧪 Worker Lab v2</h3>

<input id="slug" placeholder="enter slug..." />

<button onclick="run()">Run</button>
<button onclick="regenerate()">Regenerate (bypass cache)</button>

<div class="tabs">
  <div class="tab active" onclick="setView('render')">Render</div>
  <div class="tab" onclick="setView('raw')">Raw</div>
  <div class="tab" onclick="setView('sources')">Sources</div>
  <div class="tab" onclick="setView('debug')">Debug</div>
</div>

<pre id="debugBox">idle</pre>

</div>

<div class="main" id="main">
Ready.
</div>

<script>

let state = {
  md: "",
  raw: "",
  sources: [],
  json: null,
  view: "render",
  lastSlug: ""
};

function setView(v){
  state.view = v;
  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
  event.target.classList.add("active");
  render();
}

async function fetchArticle(slug, force=false){

  const url = `https://indexmod-ai.chorus-live.workers.dev/article/${slug}` +
              (force ? "?t=" + Date.now() : "");

  const res = await fetch(url);
  const text = await res.text();

  return text;
}

async function run(){
  const slug = document.getElementById("slug").value;
  state.lastSlug = slug;

  const text = await fetchArticle(slug);

  state.raw = text;
  state.md = marked.parse(text);

  state.sources = [...text.matchAll(/\[(\d+)\]/g)].map(m=>m[1]);

  document.getElementById("debugBox").innerText =
    `chars: ${text.length}
citations: ${state.sources.length}
slug: ${slug}`;

  render();
}

async function regenerate(){
  if(!state.lastSlug) return;

  const text = await fetchArticle(state.lastSlug, true);

  state.raw = text;
  state.md = marked.parse(text);

  render();
}

function render(){
  const main = document.getElementById("main");

  if(state.view === "render"){
    main.innerHTML = state.md;
  }

  if(state.view === "raw"){
    main.innerHTML = "<pre>"+escapeHtml(state.raw)+"</pre>";
  }

  if(state.view === "sources"){

    const refs = [...state.raw.matchAll(/\[(\d+)\] ([^\n]+)/g)];

    main.innerHTML = refs.map(r=>`
      <div class="card">
        <div class="badge">[${r[1]}]</div>
        <div class="small">${r[2]}</div>
      </div>
    `).join("");
  }

  if(state.view === "debug"){
    main.innerHTML = "<pre>" + JSON.stringify(state, null, 2) + "</pre>";
  }
}

function escapeHtml(str){
  return str.replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

</script>

</body>
</html>
